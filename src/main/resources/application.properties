#Nama aplikasi
spring.application.name=Inventory

#Menonaktifkan autoconfiguration untuk DataSource (agar tidak memerlukan koneksi database)
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

#Konfigurasi lokasi view JSP
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

#Konfigurasi folder static
spring.mvc.static-path-pattern=/static/**
spring.resources.static-locations=classpath:/static/


# Jika nanti ingin mengaktifkan koneksi database, uncomment bagian ini:
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/inventory
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect